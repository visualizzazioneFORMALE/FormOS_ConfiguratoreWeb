<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuratore Sedia 3D</title>
  <link rel="stylesheet" href="css/style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="loader-spinner"></div>
    <p class="loader-text">Caricamento configuratore...</p>
  </div>

  <!-- 3D Viewport -->
  <div id="canvas-container"></div>

  <!-- Configuration Panel -->
  <div id="panel" class="config-panel">
    <div class="panel-header">
      <div class="panel-title">
        <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        Configura
      </div>
      <button id="btn-reset" title="Ripristina configurazione">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Reset
      </button>
    </div>

    <div class="panel-sections">
      <!-- Populated by JS -->
    </div>

    <div class="light-control">
      <label class="light-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        Luce
      </label>
      <input type="range" id="light-angle" min="0" max="360" value="45" step="1" />
    </div>

    <div class="panel-footer">
      <span class="hint-text">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        Clicca sulla sedia per selezionare
      </span>
      <button id="btn-ar" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        Vedi in AR
      </button>
      <!-- Link nascosto per iOS Quick Look -->
      <a id="ar-ios-link" rel="ar" href="TARGETPOINT_VovoChair.usdz" style="display:none">
        <img src="" alt="">
      </a>
    </div>
  </div>

  <!-- AR Overlay (visible only during WebXR session) -->
  <div id="ar-overlay" style="display:none">
    <button id="btn-ar-exit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      Esci
    </button>
    <p id="ar-hint">Punta la camera verso il pavimento, poi tocca per posizionare la sedia</p>
  </div>

  <!-- Orbit hint (disappears on first interaction) -->
  <div id="orbit-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
      <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
      <path d="M3.6 9h16.8M3.6 15h16.8M11.5 3a17 17 0 0 0 0 18M12.5 3a17 17 0 0 1 0 18"/>
    </svg>
    Trascina per ruotare
  </div>

  <script type="module" src="js/configurator.js"></script>
</body>
</html>
